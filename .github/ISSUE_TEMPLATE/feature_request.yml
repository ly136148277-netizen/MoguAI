name: Feature request
description: Suggest an idea / 功能建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case / 问题或使用场景
      description: What problem does this solve? / 这解决什么问题？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution / 建议方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered / 其他方案
